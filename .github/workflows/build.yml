name: Build & Integration Tests

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby: [3.3, 3.4, 4.0]

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Ruby ${{ matrix.ruby }}
      uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde # v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true

    - name: Install GEMs
      run: |
        bundle config force_ruby_platform true
        bundle config path vendor/bundle
        bundle install --jobs 4 --retry 3

    - name: rubocop
      run: bundle exec rubocop

    # Runs Specs which are not tagged as slow first to speed up the process in case of failure in those
    # The full specs suite (and final coverage report) only runs on pushes to master to keep PRs quick
    - name: rspec
      run: bundle exec rspec --tag ~slow

    - name: rspec (full suite)
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      run: bundle exec rspec

    - name: Set up DDEV
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
      uses: ddev/github-action-setup-ddev@fdf2f5c97943bae638f31df6df86f1defa6210c0 # v1
      with:
        autostart: false

    - name: Set up WordPress test environment
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
      run: |
        mkdir wordpress-test
        cd wordpress-test
        bash "${GITHUB_WORKSPACE}/spec/integration/setup_wp_test_env.sh"

    - name: Run WPScan against test site and verify results
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
      env:
        WPSCAN_API_TOKEN: ${{ secrets.WPSCAN_API_TOKEN }}
      run: bash spec/integration/run_scan.sh

    - name: Upload scan results
      if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: integration-test-results-ruby-${{ matrix.ruby }}
        path: scan-results.json

    # Coverage reporting
    - name: Coveralls (parallel)
      uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2
      continue-on-error: true
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        flag-name: ruby-${{ matrix.ruby }}
        parallel: true

  finish:
    needs: build
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
    - name: Coveralls finished
      uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        parallel-finished: true
        carryforward: "ruby-3.3,ruby-3.4,ruby-4.0"
