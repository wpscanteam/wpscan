name: Build

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby: [3.3, 3.4, 4.0]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Ruby ${{ matrix.ruby }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}

    - name: Install GEMs
      run: |
        gem install bundler
        bundle config force_ruby_platform true
        bundle config path vendor/bundle
        bundle install --jobs 4 --retry 3

    - name: rubocop
      run: |
        bundle exec rubocop

    # Runs Specs which are not tagged as slow first to speed up the process in case of failure in those
    # The full specs suite (and final coverage report) only runs on pushes to master to keep PRs quick
    - name: rspec
      run: bundle exec rspec --tag ~slow

    - name: rspec (full suite)
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      run: bundle exec rspec

    - name: Coveralls (parallel)
      uses: coverallsapp/github-action@v2
      continue-on-error: true
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        flag-name: ruby-${{ matrix.ruby }}
        parallel: true

  finish:
    needs: build
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
    - name: Coveralls finished
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        parallel-finished: true
        carryforward: "ruby-3.3,ruby-3.4,ruby-4.0"
